<!DOCTYPE html>
<html 
	lang="en" 
	th:replace="~{basic :: parent(~{::#content} , ~{::#title} , ~{::#script})}">
<head>
	<title id="title">Sign up Page</title>
</head>
<body>
	<div id="content">
		
		<div class="grid grid-cols-12">
			
			<div class="col-span-4 md:col-span-2 lg:span-span-3 xl:col-span-4">	
			</div>
			
			<div class="col-span-12 md:col-span-8 lg:col-span-6 xl:col-span-4">
				

				<div class="block max-w-sm p-6 bg-white border border-black-200 rounded-lg shadow-sm hover:bg-gray-100 dark:bg-gray-800 dark:border-gray-700 dark:hover:bg-gray-700">

				<h5 class="mb-2 text-2xl font-bold tracking-tight text-gray-900 dark:text-white">Sign Up here</h5>
				<p class="font-normal text-gray-400 dark:text-gray-400">Here are the biggest enterprise technology acquisitions of 2021 so far, in reverse chronological order.</p>
				
				<div class="mb-4">
				    <label for="name" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Your Name</label>
				    <input type="text" id="name" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="name" required />
				  </div>
				  
				  <div class="mb-4">
				      <label for="email" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Email</label>
				      <input type="email" id="email" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="name@flowbite.com" required />
				    </div>
					
					<div class="mb-3">
					    <label for="password" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Password</label>
					    <input type="password" id="password" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" required />
					  </div>
					  
					  <div class="mb-5">
					      <label for="phoneNo" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Phone Number</label>
					      <input type="number" id="number" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" required />
					    </div>
						
						<div class="mb-3 space-x-3">
							<button class="px-3 py-2 rounded bg-gray-900 text-white">Sign Up</button>
							
							<button class="px-3 py-2 rounded bg-red-300 text-white">Reset</button>		
						</div>
						
				</div>

				
			</div>
			
		</div>
		
		
	</div>
    <script id="script">
		console.log("sign up page running");
	</script>
</body>
</html>
