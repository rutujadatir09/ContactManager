<!DOCTYPE html>
<html 
    lang="en" 
    th:replace="~{basic :: parent(~{::#content}, ~{::#title}, ~{::#script})}">
<head>
    <title id="title">Sign up Page</title>
</head>
<body>
    <div id="content">
        
        <div class="grid grid-cols-12">
            
            <div class="col-span-4 md:col-span-2 lg:col-span-3 xl:col-span-4"></div>
            
            <div class="col-span-12 md:col-span-8 lg:col-span-6 xl:col-span-4">
                
                <div class="block max-w-sm p-6 bg-white border-t-8 border-blue-700 rounded-lg shadow-sm hover:bg-gray-100 dark:bg-gray-800 dark:border-gray-700 dark:hover:bg-gray-700">

                    <h4 class="mb-2 text-2xl font-bold tracking-tight text-gray-900 dark:text-white">
                        Sign Up here
                    </h4>
                    
                    <!-- ✅ th:object matches model.addAttribute("userForm", new UserForm()) -->
                    <form th:action="@{/do-register}" th:object="${userForm}" method="post" class="mt-5" novalidate>
                        
                        <div class="mb-4">
                            <label for="name" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">
                                Your Name
                            </label>
                            <input type="text" id="name" th:field="*{name}" 
                                   class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg 
                                          focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 
                                          dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 
                                          dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" 
                                   placeholder="Enter your name" required />
                        </div>
                      
                        <div class="mb-4">
                            <label for="email" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">
                                Email
                            </label>
                            <input type="email" id="email" th:field="*{email}" 
                                   class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg 
                                          focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 
                                          dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 
                                          dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" 
                                   placeholder="name@example.com" required />
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">
                                Password
                            </label>
                            <input type="password" id="password" th:field="*{password}" 
                                   class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg 
                                          focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 
                                          dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 
                                          dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" 
                                   placeholder="Enter your password" required />
                        </div>
                          
                        <div class="mb-5">
                            <label for="phoneno" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">
                                Phone Number
                            </label>
                            <input type="text" id="phoneno" th:field="*{phoneno}" 
                                   class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg 
                                          focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 
                                          dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 
                                          dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" 
                                   placeholder="Enter your phone number" required />
                        </div>
                            
                        <div class="mb-3 space-x-3">
                            <button type="submit" class="px-3 py-2 rounded bg-gray-900 text-white">
                                Sign Up
                            </button>
                                
                            <button type="reset" class="px-3 py-2 rounded bg-red-400 text-white">
                                Reset
                            </button>      
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script id="script">
        console.log("Sign up page running...");
    </script>
</body>
</html>
